android.useAndroidX=true
android.enableJetifier=true
# NOTA BUILD EN ESTA MÁQUINA: el software de seguridad bloquea sockets AF_UNIX
# (connect → EINVAL) y JDK 16+ los usa en Selector.open, causando
# "Unable to establish loopback connection". El workaround debe ir en la
# variable de entorno JAVA_TOOL_OPTIONS (llega a TODOS los JVM al arrancar;
# ponerla aquí en jvmargs se aplica demasiado tarde):
#   JAVA_TOOL_OPTIONS=-Djdk.net.unixdomain.tmpdir=Z:\no_existe
# Al fallar el bind del socket Unix, el JDK cae a loopback TCP, que sí funciona.
org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=false
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
android.experimental.sdk.compileSdk=34
